<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassFlow — เข้าสู่ระบบ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg:#F6F5F0; --surface:#fff; --border:#E4E2DA; --text:#1A1A18; --muted:#6B6A65; --hint:#A8A7A2;
  --teal:#1D9E75; --teal-lt:#E1F5EE; --teal-dk:#14754F;
  --red:#993C1D; --red-lt:#FAECE7;
  --blue:#185FA5; --blue-lt:#E6F1FB;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
  font-family:'Sarabun',sans-serif; color:var(--text);
  display:flex; min-height:100vh; overflow:hidden;
}

/* ── Left panel ── */
.left-panel{
  width:480px; flex-shrink:0;
  background:
    radial-gradient(600px 400px at 75% 15%, rgba(255,255,255,.14), transparent 55%),
    radial-gradient(500px 500px at 10% 90%, rgba(0,0,0,.12), transparent 60%),
    linear-gradient(150deg,#23B083 0%,#1D9E75 45%,#14754F 100%);
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  padding:60px 48px; gap:32px; position:relative; overflow:hidden;
}
.left-panel::before{
  content:''; position:absolute; width:400px; height:400px; border-radius:50%;
  background:rgba(255,255,255,.07); top:-100px; right:-100px;
}
.left-panel::after{
  content:''; position:absolute; width:280px; height:280px; border-radius:50%;
  background:rgba(255,255,255,.06); bottom:-60px; left:-60px;
}
.brand{ display:flex; align-items:center; gap:16px; position:relative; z-index:1; }
.brand-icon{
  width:64px; height:64px; border-radius:18px; background:rgba(255,255,255,.22);
  border:1px solid rgba(255,255,255,.25);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 24px rgba(0,0,0,.18); backdrop-filter:blur(8px);
}
.brand-icon i{ color:#fff; font-size:32px; }
.brand-text .name{ font-size:28px; font-weight:700; color:#fff; letter-spacing:-.02em; }
.brand-text .sub{ font-size:14px; color:rgba(255,255,255,.72); margin-top:2px; }

.left-features{ display:flex; flex-direction:column; gap:14px; position:relative; z-index:1; width:100%; }
.feat-item{ display:flex; align-items:center; gap:14px; padding:10px 12px; border-radius:14px;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); backdrop-filter:blur(6px); transition:background .2s; }
.feat-item:hover{ background:rgba(255,255,255,.14); }
.feat-icon{ width:40px; height:40px; border-radius:11px; background:rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.feat-icon i{ color:#fff; font-size:20px; }
.feat-text .t{ font-size:14px; font-weight:600; color:#fff; }
.feat-text .s{ font-size:12px; color:rgba(255,255,255,.7); margin-top:1px; }

/* ── Right panel ── */
.right-panel{
  flex:1; display:flex; align-items:center; justify-content:center;
  background:var(--bg); padding:40px 24px;
}
.login-card{
  background:var(--surface); border-radius:22px; padding:40px 40px 36px;
  width:100%; max-width:420px;
  box-shadow:0 2px 8px rgba(26,26,24,.04), 0 16px 48px rgba(26,26,24,.1);
  border:1px solid rgba(255,255,255,.6);
  animation:card-in .4s cubic-bezier(.2,.8,.3,1);
}
@keyframes card-in{ from{ opacity:0; transform:translateY(16px); } to{ opacity:1; transform:none; } }
.card-title{ font-size:23px; font-weight:700; margin-bottom:4px; letter-spacing:-.02em; }
.card-sub{ font-size:14px; color:var(--muted); margin-bottom:30px; }

.form-group{ margin-bottom:18px; }
.form-group label{ display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; letter-spacing:.03em; }
.input-wrap{ position:relative; }
.input-wrap i{ position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--hint); font-size:18px; }
.form-group input{
  width:100%; padding:11px 12px 11px 40px; border:1.5px solid var(--border);
  border-radius:10px; font-family:'Sarabun',sans-serif; font-size:15px;
  background:var(--bg); color:var(--text); outline:none; transition:border-color .15s, box-shadow .15s;
}
.form-group input:focus{ border-color:var(--teal); box-shadow:0 0 0 3px rgba(29,158,117,.12); }
.form-group input.error{ border-color:var(--red); }

.error-msg{ font-size:13px; color:var(--red); margin-bottom:14px; display:flex; align-items:center; gap:6px; min-height:20px; }
.error-msg i{ font-size:15px; }

.btn-login{
  width:100%; padding:13px; border-radius:11px; border:none;
  background:linear-gradient(135deg,#23B083 0%,#178860 100%); color:#fff; font-size:15px; font-weight:600;
  font-family:'Sarabun',sans-serif; cursor:pointer; transition:box-shadow .18s, transform .1s;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 4px 14px rgba(29,158,117,.35);
}
.btn-login:hover{ box-shadow:0 6px 20px rgba(29,158,117,.45); }
.btn-login:active{ transform:scale(.98); }
.btn-login:disabled{ background:#aaa; box-shadow:none; cursor:not-allowed; }
.btn-login .spinner{ width:18px; height:18px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }

.demo-box{ margin-top:24px; background:var(--bg); border-radius:10px; padding:14px 16px; }
.demo-title{ font-size:12px; font-weight:600; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.demo-title i{ font-size:14px; }
.demo-accounts{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.demo-btn{
  background:var(--surface); border:1px solid var(--border); border-radius:9px;
  padding:9px 12px; cursor:pointer; text-align:left; transition:border-color .15s, box-shadow .15s, transform .12s;
  font-family:'Sarabun',sans-serif;
}
.demo-btn:hover{ border-color:var(--teal); box-shadow:0 2px 8px rgba(29,158,117,.12); transform:translateY(-1px); }
.demo-btn .role{ font-size:11px; font-weight:600; margin-bottom:3px; }
.demo-btn .role.teacher{ color:var(--teal); }
.demo-btn .role.student{ color:var(--blue); }
.demo-btn .cred{ font-size:12px; color:var(--muted); font-family:monospace; }

@media(max-width:768px){
  .left-panel{ display:none; }
  .right-panel{ background:var(--surface); }
}
</style>
</head>
<body>

<!-- Left branding panel -->
<div class="left-panel">
  <div class="brand">
    <div class="brand-icon"><i class="ti ti-school"></i></div>
    <div class="brand-text">
      <div class="name">ClassFlow</div>
      <div class="sub">ระบบจัดการห้องเรียน</div>
    </div>
  </div>
  <div class="left-features">
    <div class="feat-item">
      <div class="feat-icon"><i class="ti ti-layout-kanban"></i></div>
      <div class="feat-text">
        <div class="t">บอร์ดการบ้าน Kanban</div>
        <div class="s">ติดตามงานของนักเรียนแบบ real-time</div>
      </div>
    </div>
    <div class="feat-item">
      <div class="feat-icon"><i class="ti ti-users"></i></div>
      <div class="feat-text">
        <div class="t">จัดการนักเรียนหลายห้อง</div>
        <div class="s">รองรับ ม.5/1 — ม.5/3 และขยายได้</div>
      </div>
    </div>
    <div class="feat-item">
      <div class="feat-icon"><i class="ti ti-video"></i></div>
      <div class="feat-text">
        <div class="t">สื่อการสอนและวิดีโอ</div>
        <div class="s">แชร์ PDF เอกสาร และ YouTube Embed</div>
      </div>
    </div>
    <div class="feat-item">
      <div class="feat-icon"><i class="ti ti-chart-bar"></i></div>
      <div class="feat-text">
        <div class="t">ผลการเรียนและคะแนน</div>
        <div class="s">ดูสถิติห้องเรียนและรายบุคคล</div>
      </div>
    </div>
  </div>
</div>

<!-- Right login panel -->
<div class="right-panel">
  <div class="login-card">
    <div class="card-title">เข้าสู่ระบบ</div>
    <div class="card-sub">ยินดีต้อนรับสู่ ClassFlow</div>

    <div class="form-group">
      <label>ชื่อผู้ใช้</label>
      <div class="input-wrap">
        <i class="ti ti-user"></i>
        <input type="text" id="username" placeholder="เช่น teacher หรือ s001" autocomplete="username">
      </div>
    </div>

    <div class="form-group">
      <label>รหัสผ่าน</label>
      <div class="input-wrap">
        <i class="ti ti-lock"></i>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <i class="ti ti-login"></i> เข้าสู่ระบบ
    </button>

    <div class="demo-box">
      <div class="demo-title"><i class="ti ti-info-circle"></i> บัญชีทดลองใช้งาน</div>
      <div class="demo-accounts">
        <button class="demo-btn" onclick="fillDemo('teacher','1234')">
          <div class="role teacher">ครูผู้สอน</div>
          <div class="cred">teacher / 1234</div>
        </button>
        <button class="demo-btn" onclick="fillDemo('s001','1234')">
          <div class="role student">นักเรียน ม.5/1</div>
          <div class="cred">s001 / 1234</div>
        </button>
        <button class="demo-btn" onclick="fillDemo('s002','1234')">
          <div class="role student">นักเรียน ม.5/1</div>
          <div class="cred">s002 / 1234</div>
        </button>
        <button class="demo-btn" onclick="fillDemo('s006','1234')">
          <div class="role student">นักเรียน ม.5/2</div>
          <div class="cred">s006 / 1234</div>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// Auto-redirect if already logged in
fetch('/api/auth/me').then(r => r.json()).then(d => {
  if (d.role === 'teacher') location.replace('/');
  else if (d.role === 'student') location.replace('/student.html');
}).catch(() => {});

function fillDemo(u, p) {
  document.getElementById('username').value = u;
  document.getElementById('password').value = p;
  document.getElementById('username').classList.remove('error');
  document.getElementById('password').classList.remove('error');
  document.getElementById('error-msg').innerHTML = '';
  document.getElementById('password').focus();
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errEl    = document.getElementById('error-msg');
  const btn      = document.getElementById('btn-login');

  errEl.innerHTML = '';
  document.getElementById('username').classList.remove('error');
  document.getElementById('password').classList.remove('error');

  if (!username) {
    document.getElementById('username').classList.add('error');
    errEl.innerHTML = '<i class="ti ti-alert-circle"></i> กรุณากรอกชื่อผู้ใช้';
    document.getElementById('username').focus();
    return;
  }
  if (!password) {
    document.getElementById('password').classList.add('error');
    errEl.innerHTML = '<i class="ti ti-alert-circle"></i> กรุณากรอกรหัสผ่าน';
    document.getElementById('password').focus();
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> กำลังเข้าสู่ระบบ...';

  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.innerHTML = `<i class="ti ti-alert-circle"></i> ${data.error || 'เกิดข้อผิดพลาด'}`;
      document.getElementById('username').classList.add('error');
      document.getElementById('password').classList.add('error');
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-login"></i> เข้าสู่ระบบ';
      return;
    }
    if (data.role === 'teacher') location.replace('/');
    else location.replace('/student.html');
  } catch(e) {
    errEl.innerHTML = '<i class="ti ti-alert-circle"></i> ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-login"></i> เข้าสู่ระบบ';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
